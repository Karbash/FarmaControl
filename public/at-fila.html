<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fila de Atendimentos - FarmaControl</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/at-app.css" />
    <script src="/js/auth.js"></script>
  </head>
  <body>
    <div id="app">
      <aside class="sb">
        <div class="sb-logo">
          <img src="img/logo-icm.png" alt="" />
          <div class="lt">Ambulatório Maanaim</div>
          <div class="ls">Atendimentos</div>
        </div>
        <nav class="nav-sec">
          <div class="nav-lbl">Atendimentos</div>
          <a href="at-dashboard.html" class="nav-item"><span class="material-icons nav-icon">dashboard</span> Dashboard</a>
          <a href="at-fila.html" class="nav-item active"><span class="material-icons nav-icon">queue</span> Fila de Espera</a>
          <a href="at-pacientes.html" class="nav-item"><span class="material-icons nav-icon">people</span> Pacientes</a>
          <a href="at-relatorios.html" class="nav-item"><span class="material-icons nav-icon">assessment</span> Relatórios</a>
        </nav>
        <nav class="nav-sec">
          <div class="nav-lbl">Sistema</div>
          <a href="dashboard.html" class="nav-item"><span class="material-icons nav-icon">apps</span> Módulos</a>
        </nav>
        <div class="sb-user">
          <span class="material-icons" style="font-size:1.3rem;color:rgba(255,255,255,0.7)">account_circle</span>
          <div style="flex:1;min-width:0">
            <div id="sb-user-nome" style="font-size:0.78rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">—</div>
            <div id="sb-user-tipo" style="font-size:0.62rem;color:rgba(255,255,255,0.45)">—</div>
          </div>
          <button onclick="logout()" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.45);padding:4px" title="Sair"><span class="material-icons" style="font-size:1.1rem">logout</span></button>
        </div>
        <div class="sb-foot">FarmaControl v2.1</div>
      </aside>
      <main class="main">
        <div class="ph">
          <div>
            <div class="pt">Fila de Espera</div>
            <div class="ps">Gerencie os atendimentos</div>
          </div>
          <button class="btn btn-p" onclick="atAbrirModalNovoAtendimento()">+ Novo Atendimento</button>
        </div>
        <div class="filtros-linha">
          <input type="date" id="at-filtro-data" value="" onchange="filtroData=this.value;atAtualizarFila()">
          <select id="at-filtro-status" onchange="filtroStatus=this.value;atAtualizarFila()">
            <option value="">Todos os status</option>
            <option value="aguardando">Aguardando</option>
            <option value="triagem">Triagem</option>
            <option value="em_atendimento">Em Atendimento</option>
            <option value="encerrado">Encerrado</option>
          </select>
        </div>
        <div id="at-fila"></div>
      </main>
    </div>

    <div id="modal-novo-atendimento" class="mo">
      <div class="modal" style="max-width:500px">
        <div class="modal-header">
          <div class="modal-title">Novo Atendimento</div>
          <button class="modal-close" onclick="atCloseModal('modal-novo-atendimento')">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Paciente</label>
            <div class="at-paciente-selecionado" id="at-nat-paciente-nome">Selecione abaixo...</div>
            <input type="hidden" id="at-nat-paciente">
            <input type="text" id="at-nat-busca-paciente" placeholder="Buscar paciente..." onkeyup="atBuscarPacienteInput()">
            <div id="at-nat-resultados" class="at-busca-resultados"></div>
            <button type="button" class="btn btn-sm btn-g" style="margin-top:8px" onclick="atAbrirNovoPaciente()">+ Novo Paciente</button>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label>Data</label>
              <input type="date" id="at-nat-data">
            </div>
            <div class="form-group">
              <label>Hora</label>
              <input type="time" id="at-nat-hora">
            </div>
          </div>
          <div class="form-group">
            <label>Tipo</label>
            <select id="at-nat-tipo">
              <option value="consulta">Consulta</option>
              <option value="retorno">Retorno</option>
              <option value="encaixe">Encaixe</option>
            </select>
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="at-nat-emergencia" style="width:auto;margin-right:8px">
              <span style="color:var(--md-error);font-weight:600"><span class="material-icons" style="font-size:1rem;vertical-align:middle">warning</span> Emergência</span>
            </label>
          </div>
          <div class="form-group">
            <label>Responsável pelo Atendimento *</label>
            <select id="at-nat-responsavel">
              <option value="">Carregando equipe...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Observações</label>
            <textarea id="at-nat-obs" rows="2"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-g" onclick="atCloseModal('modal-novo-atendimento')">Cancelar</button>
          <button class="btn btn-p" onclick="atSalvarNovoAtendimento()">Criar Atendimento</button>
        </div>
      </div>
    </div>

    <div id="modal-novo-paciente" class="mo">
      <div class="modal" style="max-width:500px">
        <div class="modal-header">
          <div class="modal-title">Novo Paciente</div>
          <button class="modal-close" onclick="atCloseModal('modal-novo-paciente')">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Nome *</label>
            <input type="text" id="at-np-nome">
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label>CPF</label>
              <input type="text" id="at-np-cpf">
            </div>
            <div class="form-group">
              <label>Data Nasc.</label>
              <input type="date" id="at-np-nascimento">
            </div>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label>Sexo</label>
              <select id="at-np-sexo">
                <option value="">Selecione...</option>
                <option value="M">Masculino</option>
                <option value="F">Feminino</option>
              </select>
            </div>
            <div class="form-group">
              <label>Telefone</label>
              <input type="text" id="at-np-telefone">
            </div>
          </div>
          <div class="form-group">
            <label>Endereço</label>
            <input type="text" id="at-np-endereco">
          </div>
          <div class="form-group">
            <label>Observações</label>
            <textarea id="at-np-obs" rows="2"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-g" onclick="atCloseModal('modal-novo-paciente')">Cancelar</button>
          <button class="btn btn-p" onclick="atSalvarNovoPaciente()">Salvar Paciente</button>
        </div>
      </div>
    </div>

    <script src="js/at-app.js"></script>
    <script>
      filtroData = atHoje();
      document.getElementById('at-filtro-data').value = filtroData;

      function initFila() {
        if (!temAcessoModulo('atendimentos')) {
          window.location.href = 'dashboard.html';
          return;
        }
        atIniciarModulo().then(() => {
          atAtualizarFila();
          atPopularSelectResponsavel('at-nat-responsavel');
        });
      }

      document.addEventListener('authReady', initFila);
      if (window.usuarioAtual) initFila();
    </script>
  </body>
</html>
